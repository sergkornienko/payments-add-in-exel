<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Відкриття загальної відомості</title>

    <!-- Office.js -->
    <script
      type="text/javascript"
      src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"
    ></script>

    <!-- Fluent UI -->
    <link
      rel="stylesheet"
      href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20230815.002/office-ui-fabric-core/11.1.0/css/fabric.min.css"
    />

    <!-- Custom CSS -->
    <link href="taskpane.css" rel="stylesheet" type="text/css" />
  </head>

  <body class="ms-font-m ms-Fabric">
    <main id="app-body" class="ms-welcome__main" style="display: none">
      <div class="ms-Grid">
        <div class="ms-Grid-row">
          <div class="ms-Grid-col ms-sm12">
            <h2
              class="ms-fontSize-18 ms-fontWeight-semibold"
              title="Порівняння відомості з рапортами.
Структура відомості:
A - назва рапорту
B - підрозділ ВС
C - звання
D - ПІБ
E - ІПН
Структура аркуша рапорту(назва аркуша відповідає сумі, наприклад: 30):
A - звання
B - ПІБ
C - період
Початковий рядок: 1
              "
            >
              Перевірка відомісті
            </h2>
            <p class="ms-fontSize-14 ms-fontWeight-regular">Місяць перевірки:</p>
          </div>
        </div>
        <form id="payrollForm" class="ms-Grid-row">
          <div class="ms-Grid-col ms-sm12">
            <input
              id="monthPayroll"
              type="text"
              placeholder="Наприклад, 01.2026"
              class="ms-TextField-field"
              style="width: 100%; padding: 8px; margin-bottom: 12px; box-sizing: border-box"
            />
          </div>
          <div class="ms-Grid-col ms-sm12">
            <p class="ms-fontSize-14 ms-fontWeight-regular">Номер першого рядка:</p>
          </div>
          <div class="ms-Grid-col ms-sm12">
            <input
              id="firstRow"
              type="text"
              placeholder="Наприклад, 2"
              class="ms-TextField-field"
              style="width: 100%; padding: 8px; margin-bottom: 12px; box-sizing: border-box"
            />
          </div>

          <div class="ms-Grid-col ms-sm12">
            <button
              type="submit"
              class="ms-Button ms-Button--primary"
              style="width: 100%; padding: 10px; font-weight: bold"
            >
              <span class="ms-Button-label">Перевірити</span>
            </button>
          </div>
        </form>

        <div class="ms-Grid-row">
          <div class="ms-Grid-col ms-sm12">
            <h2
              class="ms-fontSize-18 ms-fontWeight-semibold"
              title="Знаходить перетини періодів і формує додатки до наказу.
A - назва рапорту
B - підрозділ ВС
C - звання
D - ПІБ
E - ІПН
Початковий рядок: 2
              "
            >
              Фінальна відомість
            </h2>
            <p class="ms-fontSize-14 ms-fontWeight-regular">
              Введіть місяць для генерації періодів:
            </p>
          </div>
        </div>

        <form id="summaryForm" class="ms-Grid-row">
          <div class="ms-Grid-col ms-sm12">
            <input
              id="month"
              type="text"
              placeholder="Наприклад, 01.2026"
              class="ms-TextField-field"
              style="width: 100%; padding: 8px; margin-bottom: 12px; box-sizing: border-box"
            />
          </div>

          <div class="ms-Grid-col ms-sm12">
            <button
              type="submit"
              class="ms-Button ms-Button--primary"
              style="width: 100%; padding: 10px; font-weight: bold"
            >
              <span class="ms-Button-label">Згенерувати періоди</span>
            </button>
          </div>
        </form>

        <div class="ms-Grid-row">
          <div class="ms-Grid-col ms-sm12">
            <h2
              class="ms-fontSize-18 ms-fontWeight-semibold"
              title="Визначає, хто і коли відвідував підрозділи
Відомість підрозділу:
A - назва рапорту
B - підрозділ ВС
C - звання
D - ПІБ
E - ІПН
Відомість усіх гостей:
A - підрозділ
C - звання
D - ПІБ
Початковий рядок: 2
              "
            >
              Перевірка відвідування
            </h2>
            <p class="ms-fontSize-14 ms-fontWeight-regular">Місяць перевірки:</p>
          </div>
        </div>
        <form id="visitorsValidationForm" class="ms-Grid-row">
          <div class="ms-Grid-col ms-sm12">
            <input
              id="visitorsMonth"
              type="text"
              placeholder="Наприклад, 01.2026"
              class="ms-TextField-field"
              style="width: 100%; padding: 8px; margin-bottom: 12px; box-sizing: border-box"
            />
          </div>
          <div class="ms-Grid-col ms-sm12">
            <p class="ms-fontSize-14 ms-fontWeight-regular">Номер першого рядка:</p>
          </div>
          <div class="ms-Grid-col ms-sm12">
            <input
              id="visitorsFirstRow"
              type="text"
              placeholder="Наприклад, 2"
              class="ms-TextField-field"
              style="width: 100%; padding: 8px; margin-bottom: 12px; box-sizing: border-box"
            />
          </div>

          <div class="ms-Grid-col ms-sm12">
            <button
              type="submit"
              class="ms-Button ms-Button--primary"
              style="width: 100%; padding: 10px; font-weight: bold"
            >
              <span class="ms-Button-label">Перевірити</span>
            </button>
          </div>
        </form>

        <div class="ms-Grid-row">
          <div class="ms-Grid-col ms-sm12">
            <p id="status" class="ms-fontSize-12" style="margin-top: 10px; color: green"></p>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
