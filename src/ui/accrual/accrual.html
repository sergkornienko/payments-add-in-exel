<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Відкриття медичної відомості</title>

    <!-- Office.js -->
    <script
      type="text/javascript"
      src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"
    ></script>

    <!-- Fluent UI -->
    <link
      rel="stylesheet"
      href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20230815.002/office-ui-fabric-core/11.1.0/css/fabric.min.css"
    />

    <!-- Custom CSS -->
    <link href="accrual.css" rel="stylesheet" type="text/css" />
  </head>

  <body class="ms-font-m ms-Fabric">
    <main id="app-body" class="ms-welcome__main" style="display: none">
      <div class="ms-Grid">
        <div class="ms-Grid-row">
          <div class="ms-Grid-col ms-sm12">
            <h2
              class="ms-fontSize-18 ms-fontWeight-semibold"
              title="Додати відсутніх ВС: Перевіряє чи усі ВС з аркуша '70 з відомостей' присутні на аркуші '70'
Створити вставку: на основі аркушів '70' та '70 з відомостей' генерує загальну відомість та вставку в наказ. Перед виконанням почистіть загальну відомість
              "
            >
              70
            </h2>
            <p class="ms-fontSize-14 ms-fontWeight-regular">Перевірити наявність усіх ВС:</p>
          </div>
        </div>
        <form id="accrualAddNotExistingServicemansForm" class="ms-Grid-row">
          <div class="ms-Grid-col ms-sm12">
            <button
              type="submit"
              class="ms-Button ms-Button--primary"
              style="width: 100%; padding: 10px; font-weight: bold"
            >
              <span class="ms-Button-label">Додати відсутніх ВС</span>
            </button>
          </div>
        </form>

        <div class="ms-Grid-row">
          <div class="ms-Grid-col ms-sm12">
            <p class="ms-fontSize-14 ms-fontWeight-regular">
              Введіть місяць для формування додатка в наказ:
            </p>
          </div>
        </div>

        <form id="accrualForm" class="ms-Grid-row">
          <div class="ms-Grid-col ms-sm12">
            <input
              id="month"
              type="text"
              placeholder="Наприклад, 01.2026"
              class="ms-TextField-field"
              style="width: 100%; padding: 8px; margin-bottom: 12px; box-sizing: border-box"
            />
          </div>

          <div class="ms-Grid-col ms-sm12">
            <button
              type="submit"
              class="ms-Button ms-Button--primary"
              style="width: 100%; padding: 10px; font-weight: bold"
            >
              <span class="ms-Button-label">Створити вставку</span>
            </button>
          </div>
        </form>

        <div class="ms-Grid-row">
          <div class="ms-Grid-col ms-sm12">
            <p class="ms-fontSize-14 ms-fontWeight-regular">
              Введіть номер наказу для внесення в таблицю:
            </p>
          </div>
        </div>

        <form id="addOrderForm" class="ms-Grid-row">
          <div class="ms-Grid-col ms-sm12">
            <input
              id="order"
              type="text"
              placeholder="Наприклад, №100 від 01.01.2026"
              class="ms-TextField-field"
              style="width: 100%; padding: 8px; margin-bottom: 12px; box-sizing: border-box"
            />
          </div>

          <div class="ms-Grid-col ms-sm12">
            <button
              type="submit"
              class="ms-Button ms-Button--primary"
              style="width: 100%; padding: 10px; font-weight: bold"
            >
              <span class="ms-Button-label">Додати наказ</span>
            </button>
          </div>
        </form>

        <div class="ms-Grid-row">
          <div class="ms-Grid-col ms-sm12">
            <p id="status" class="ms-fontSize-12" style="margin-top: 10px; color: green"></p>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
